services:
  - name: wall-server
    type: web
    runtime: image
    plan: free
    image:
      # image is built and pushed by GitHub Actions (.github/workflows/ci.yml)
      url: ghcr.io/tomrandolph/on-the-wall:latest
      # GHCR package is private — pull via the registry credential named "ghcr"
      # (created in the Render dashboard, see below)
      creds:
        fromRegistryCreds:
          name: ghcr
    envVars:
      # inject the managed database connection string into the service
      - key: DATABASE_URL
        fromDatabase:
          name: wall-db
          property: connectionString
databases:
  - name: wall-db
    plan: free
