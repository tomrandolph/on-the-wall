services:
  - name: wall-server
    type: web
    runtime: image
    plan: free
    image:
      # image is built and pushed by GitHub Actions (.github/workflows/ci.yml)
      url: ghcr.io/tomrandolph/on-the-wall:latest
      # if the GHCR package is PRIVATE, add a Registry Credential named "ghcr"
      # in the Render dashboard and uncomment:
      # creds:
      #   fromRegistryCreds:
      #     name: ghcr
    envVars:
      # inject the managed database connection string into the service
      - key: DATABASE_URL
        fromDatabase:
          name: wall-db
          property: connectionString
databases:
  - name: wall-db
    plan: free
