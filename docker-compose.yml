services:
  db:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=user
      - POSTGRES_DB=db
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./server
    environment:
      - PORT=10000
      - DATABASE_URL=postgres://user:password@db:5432/db
    ports:
      - 10000:10000
    depends_on:
      db:
        condition: service_healthy
